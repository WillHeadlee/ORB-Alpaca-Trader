trading:
  mode: paper                   # paper | live (overridden by ALPACA_MODE env var)
  screener_top_n: 20            # how many top screener symbols to trade each day
  watchlist:                    # fallback if screener has no data
    - SPY
    - QQQ
    - AAPL
    - TSLA
    - NVDA

strategy:
  opening_range_minutes: 15     # 15 or 30
  risk_per_trade_pct: 1.5       # % of account equity to risk per trade
  max_position_pct: 20.0        # max % of equity in any single position
  max_open_positions: 3         # max simultaneous open positions
  stop_loss_pct: 0.75           # % below entry price for stop-loss
  reward_risk_ratio: 2.0        # take-profit = stop_loss_distance * ratio
  hard_close_time: "15:55"      # ET — force-close all positions at this time
  last_entry_time: "11:30"      # ET — no new entries after this time
  volume_multiplier: 1.2        # breakout bar volume must exceed avg_volume * this
  max_range_pct: 2.0            # skip entries if ORB high-low spread > this % of price
  spy_filter: true              # only enter when SPY is above its 9:30 open price
  stale_exit_minutes: 45        # close position if open this long without reaching min R
  stale_exit_min_r: 0.5         # minimum R profit to avoid stale close
